<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Mobile WebView Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#7C3AED" />
    <meta name="description" content="MeriSamaj — Your community, your family. Connect with samaj members, find matrimonial matches, participate in events, and more." />
    <title>MeriSamaj — Your Community, Your Family</title>
    <!-- Import Premium Fonts: Inter (body) + Playfair Display (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      /* Global WebView Resets */
      body {
        margin: 0;
        padding: 0;
        overscroll-behavior-y: contain; /* Prevent pull-to-refresh */
        user-select: none; /* No text selection */
        -webkit-user-select: none;
        -webkit-touch-callout: none; /* No long-press context menu */
        -webkit-tap-highlight-color: transparent; /* No blue tap highlight */
        touch-action: manipulation; /* Remove tap delay */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-family: 'Inter', sans-serif;
        background-color: #F8F7FC;
        color: #1A1A2E;
      }
      
      /* Input elements should be selectable */
      input, textarea {
        user-select: auto;
        -webkit-user-select: auto;
      }
      
      /* Hardware acceleration class */
      .gpu-accel {
        transform: translateZ(0);
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
